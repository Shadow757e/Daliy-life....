<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evil/olivia</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --hacker-green: #00ff88; 
            --nurse-red: #ff4d6d; 
            --dark-bg: #08090b; 
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.2);
            --glow-red: 0 0 20px rgba(255, 77, 109, 0.2);
        }

        body { 
            background: radial-gradient(circle at 20% 20%, #1a1c25 0%, var(--dark-bg) 50%);
            font-family: 'Cairo', sans-serif; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
        }

        /* --- شاشة القفل --- */
        #lock-screen { 
            position: fixed; inset: 0; background: var(--dark-bg); z-index: 10000; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(30px); transition: all 0.5s ease;
        }
        .lock-box { 
            text-align: center; padding: 50px 40px; border-radius: 40px; 
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); width: 85%; max-width: 380px;
            animation: lockBoxIntro 0.6s ease-out;
        }
        @keyframes lockBoxIntro { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .lock-icon { font-size: 3.5rem; color: var(--hacker-green); margin-bottom: 20px; filter: drop-shadow(var(--glow-green)); }
        .lock-input { display: block; margin: 25px auto; padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.4); color: #fff; text-align: center; width: 100%; font-size: 1.1rem; letter-spacing: 4px; outline: none; }
        .lock-btn { width: 100%; border: none; padding: 16px; border-radius: 20px; cursor: pointer; font-weight: 800; background: var(--hacker-green); color: #000; transition: 0.3s; }

        /* --- محتوى الموقع --- */
        .container { max-width: 480px; margin: auto; display: none; padding: 20px; }
        
        /* العداد المتطور */
        #real-timer { text-align: center; margin-bottom: 20px; }
        .days-big { font-size: 2.2rem; font-weight: 800; display: block; color: var(--hacker-green); text-shadow: var(--glow-green); }
        .hms-small { font-size: 1.1rem; color: var(--nurse-red); font-weight: 600; }

        .tabs { display: flex; background: var(--glass-bg); border-radius: 20px; margin-bottom: 25px; padding: 6px; gap: 8px; border: 1px solid var(--glass-border); overflow-x: auto; scrollbar-width: none; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #777; cursor: pointer; border-radius: 15px; font-weight: 800; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--nurse-red); color: white; box-shadow: var(--glow-red); }
        .tab-btn.active.y-theme { background: var(--hacker-green); color: #000; box-shadow: var(--glow-green); }

        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; padding: 22px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .m-border { border-right: 5px solid var(--nurse-red); }
        .y-border { border-right: 5px solid var(--hacker-green); }

        .section { display: none; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* الشات والأمنيات */
        #chat-box, #wish-list { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 25px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--glass-border); }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 0.9rem; }
        .msg.يوسف { align-self: flex-end; background: #00331a; color: var(--hacker-green); border-bottom-right-radius: 4px; }
        .msg.مريم { align-self: flex-start; background: #330011; color: var(--nurse-red); border-bottom-left-radius: 4px; }

        .wish-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; border-left: 3px solid var(--hacker-green); }
        .wish-item.done { opacity: 0.4; text-decoration: line-through; border-left-color: #555; }

        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        .input-group input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 15px; outline: none; font-family: 'Cairo'; }
        
        .action-btn { border: none; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .m-btn { background: var(--nurse-red); color: white; }
        .y-btn { background: var(--hacker-green); color: black; }

        /* زرار بفكر فيكِ */
        .nudge-btn { position: fixed; bottom: 20px; left: 20px; width: 55px; height: 55px; border-radius: 50%; border: none; background: var(--nurse-red); color: white; font-size: 1.3rem; cursor: pointer; z-index: 999; box-shadow: var(--glow-red); animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #nudge-msg { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: white; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; transition: 0.5s; z-index: 10001; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div id="nudge-msg">❤️ بيفكر فيكِ حالاً!</div>

<div id="lock-screen">
    <div class="lock-box">
        <i class="fas fa-fingerprint lock-icon"></i>
        <h2 style="margin:0; font-size:1.3rem;"> صفحه الدخول</h2>
        <p style="font-size:0.8rem; color:#777;">أدخل رمز الوصول الخاص بـ 1212</p>
        <input type="" id="pass-input" class="lock-input" placeholder="♡♡♡♡">
        <button class="lock-btn" onclick="unlock()">دخول</button>
    </div>
</div>

<button class="nudge-btn" onclick="sendNudge()"><i class="fas fa-heart"></i></button>

<div class="container" id="main-content">
    <div id="real-timer">
        <span class="days-big" id="days-val">0 Days</span>
        <span class="hms-small" id="hms-val">00:00:00</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('mood', this)">المود</button>
        <button class="tab-btn" onclick="showTab('tasks', this)">المهام</button>
        <button class="tab-btn" onclick="showTab('wishes', this)">الأمنيات</button>
        <button class="tab-btn" onclick="showTab('questions', this)">سؤال</button>
        <button class="tab-btn" onclick="showTab('chat', this)">الشات</button>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <select id="user-role" onchange="syncRole()" style="background:var(--glass-bg); color:white; border:1px solid var(--glass-border); padding:8px; border-radius:12px; outline:none; font-family:'Cairo';">
            <option value="يوسف">يوسف 🧑‍💻</option>
            <option value="مريم">مريم 🩺</option>
        </select>
    </div>

    <div id="mood" class="section active">
        <div class="card m-border">
            <h3 style="color:var(--nurse-red); margin:0; font-size:0.8rem;">مود مريم 🩺</h3>
            <p id="m-mood-display" style="font-size:1.1rem; margin:12px 0;">...</p>
            <div id="m-mood-ctrl" style="display:none" class="input-group">
                <input type="text" id="m-mood-text" placeholder="مودِك دلوقتي  ايه؟">
                <button class="action-btn m-btn" onclick="updateMood('m')">تحديث</button>
            </div>
        </div>
        <div class="card y-border">
            <h3 style="color:var(--hacker-green); margin:0; font-size:0.8rem;">مود يوسف 🧑‍💻</h3>
            <p id="y-mood-display" style="font-size:1.1rem; margin:12px 0;">...</p>
            <div id="y-mood-ctrl" style="display:none" class="input-group">
                <input type="text" id="y-mood-text" placeholder="مودك دلوقتي  ايه؟">
                <button class="action-btn y-btn" onclick="updateMood('y')">تحديث</button>
            </div>
        </div>
    </div>

    <div id="tasks" class="section">
        <div class="card m-border">
            <b style="color:var(--nurse-red);">مهمة مريومهع 🩺:</b>
            <p id="m-task-display" style="font-size:1.1rem; margin:10px 0;">...</p>
            <div id="y-to-m-ctrl" style="display:none" class="input-group">
                <input type="text" id="input-to-m" placeholder="أعطها مهمة...">
                <button class="y-btn" onclick="saveTask('m')">إرسال</button>
            </div>
        </div>
        <div class="card y-border">
            <b style="color:var(--hacker-green);">مهمة سفسوفهع 🧑‍💻:</b>
            <p id="y-task-display" style="font-size:1.1rem; margin:10px 0;">...</p>
            <div id="m-to-y-ctrl" style="display:none" class="input-group">
                <input type="text" id="input-to-y" placeholder="أعطه مهمة...">
                <button class="m-btn" onclick="saveTask('y')">إرسال</button>
            </div>
        </div>
    </div>

    <div id="wishes" class="section">
        <div class="card">
            <h3 style="color:var(--nurse-red); margin-top:0;">صندوق الامنيات ✨</h3>
            <div id="wish-list"></div>
            <div class="input-group">
                <input type="text" id="wish-in" placeholder="أمنية جديدة...">
                <button class="y-btn" onclick="addWish()">إضافة</button>
            </div>
        </div>
    </div>

    <div id="questions" class="section">
        <div class="card" style="text-align: center;">
            <h3 id="daily-q-text" style="color:var(--hacker-green); margin-bottom:15px;">...</h3>
            <textarea id="ans-in" style="width:100%; height:80px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:white; border-radius:15px; padding:10px; font-family:'Cairo';" placeholder="إجابتك السرية..."></textarea>
            <button class="action-btn y-btn" style="margin-top:10px; width:100%;" onclick="saveAns()">حفظ الإجابة</button>
        </div>
    </div>

    <div id="chat" class="section">
        <div id="chat-box"></div>
        <div class="input-group" style="background:var(--glass-bg); padding:8px; border-radius:50px;">
            <input type="text" id="msg-input" placeholder="اكتب شيئاً..." style="background:none; border:none;" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="y-btn" style="width:40px; height:40px; border-radius:50%;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://youssef-mariam-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function unlock() {
        if(document.getElementById('pass-input').value === "1212") {
            document.getElementById('lock-screen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('main-content').style.display = "block";
                syncRole();
            }, 500);
        } else {
            document.querySelector('.lock-box').style.animation = 'shake 0.3s ease';
            setTimeout(() => document.querySelector('.lock-box').style.animation = '', 300);
            document.getElementById('pass-input').value = "";
        }
    }

    function syncRole() {
        const role = document.getElementById('user-role').value;
        document.getElementById('m-mood-ctrl').style.display = (role === "مريم") ? "flex" : "none";
        document.getElementById('y-mood-ctrl').style.display = (role === "يوسف") ? "flex" : "none";
        document.getElementById('y-to-m-ctrl').style.display = (role === "يوسف") ? "flex" : "none";
        document.getElementById('m-to-y-ctrl').style.display = (role === "مريم") ? "flex" : "none";
        
        const activeTab = document.querySelector('.tab-btn.active');
        if(role === "يوسف") activeTab.classList.add('y-theme'); else activeTab.classList.remove('y-theme');
        document.querySelector('.nudge-btn').style.background = (role === "يوسف") ? "var(--hacker-green)" : "var(--nurse-red)";
    }

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'y-theme'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        syncRole();
    }

    // العداد المتطور
    const start = new Date("2024-04-16T00:00:00");
    setInterval(() => {
        const diff = new Date() - start;
        const d = Math.floor(diff/86400000);
        const h = String(Math.floor((diff/3600000)%24)).padStart(2,'0');
        const m = String(Math.floor((diff/60000)%60)).padStart(2,'0');
        const s = String(Math.floor((diff/1000)%60)).padStart(2,'0');
        document.getElementById('days-val').innerText = d + " Days";
        document.getElementById('hms-val').innerText = `${h}:${m}:${s}`;
    }, 1000);

    // زرار "بفكر فيكِ"
    function sendNudge() {
        const role = document.getElementById('user-role').value;
        db.ref('nudge').set({ s: role, t: Date.now() });
    }
    db.ref('nudge').on('value', snap => {
        const d = snap.val();
        if(d && Date.now() - d.t < 5000) {
            const box = document.getElementById('nudge-msg');
            box.innerText = d.s + " بيفكر فيكِ حالاً! ❤️";
            box.style.top = "20px";
            setTimeout(() => box.style.top = "-70px", 4000);
        }
    });

    // المود والمهام
    function updateMood(u) {
        const t = document.getElementById(u + '-mood-text').value;
        if(t.trim()) { db.ref('moods/' + u).set(t); document.getElementById(u + '-mood-text').value = ""; }
    }
    db.ref('moods').on('value', s => {
        const v = s.val() || {y: '...', m: '...'};
        document.getElementById('y-mood-display').innerText = v.y;
        document.getElementById('m-mood-display').innerText = v.m;
    });

    function saveTask(target) {
        const val = document.getElementById(target === 'm' ? 'input-to-m' : 'input-to-y').value;
        if(val.trim()) { db.ref('tasks/' + target).set(val); document.getElementById(target === 'm' ? 'input-to-m' : 'input-to-y').value = ""; }
    }
    db.ref('tasks').on('value', s => {
        const d = s.val() || {y: 'لا يوجد', m: 'لا يوجد'};
        document.getElementById('y-task-display').innerText = d.y;
        document.getElementById('m-task-display').innerText = d.m;
    });

    // الأمنيات
    function addWish() {
        const t = document.getElementById('wish-in').value;
        if(t) { db.ref('wishes').push({ t: t, d: false }); document.getElementById('wish-in').value = ""; }
    }
    db.ref('wishes').on('value', s => {
        const list = document.getElementById('wish-list'); list.innerHTML = "";
        s.forEach(c => {
            const d = c.val();
            const div = document.createElement('div'); div.className = `wish-item ${d.d ? 'done' : ''}`;
            div.innerHTML = `<span>${d.t}</span> <i class="fas fa-check-circle" onclick="toggleWish('${c.key}', ${d.d})"></i>`;
            list.appendChild(div);
        });
    });
    function toggleWish(k, st) { db.ref('wishes/'+k).update({ d: !st }); }

    // سؤال اليوم
    const qs = ["أكثر شيء يسعدك في يومك؟"، "أجمل ذكرى لنا حتى الآن؟"];
    document.getElementById('daily-q-text').innerText = qs[Math.floor((new Date()/86400000)%qs.length)];
    function saveAns() {
        const r = document.getElementById('user-role').value;
        const a = document.getElementById('ans-in').value;
        if(a) { db.ref('ans/'+r).set(a); alert("تم حفظ إجابتك السرية!"); }
    }

    // الشات
    function sendMsg() {
        const u = document.getElementById('user-role').value;
        const t = document.getElementById('msg-input').value;
        if(t.trim()) { db.ref('msgs').push().set({s: u, t: t}); document.getElementById('msg-input').value = ""; }
    }
    db.ref('msgs').limitToLast(15).on('child_added', snap => {
        const d = snap.val();
        const div = document.createElement('div'); div.className = `msg ${d.s}`;
        div.innerHTML = `<b>${d.s}:</b> ${d.t}`;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    });
</script>
</body>
</html>
